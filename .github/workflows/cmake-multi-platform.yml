# $JDTAUS$

# This starter workflow is for a CMake project running on multiple platforms.
# There is a different starter workflow if you just want a single platform.
# See:
# https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix
      # combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner
      # image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner
      # image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner
      # image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the
      # build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: gcc
            cpp_compiler: g++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: macos-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step
      # outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: sh
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
    
    - name: Install build dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run : |
        sudo apt-get update
        sudo apt-get install -y libpq-dev libecpg-dev

    - name: Install build dependencies (MacOS)
      if: runner.os == 'macOS'
      run: |
        brew install bison postgresql

    - name: Install build dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install pkgconfiglite postgresql winflexbison -y --no-progress

    - name: Set PostgreSQL paths for CMake (MacOS)
      if: runner.os == 'macOS'
      run: |
        PG_PREFIX=$(brew --prefix postgresql)
        BISON_PREFIX=$(brew --prefix bison)
        OSSL_PREFIX=$(brew --prefix openssl)

        if [ -z "$PG_PREFIX" ] || [ ! -d "$PG_PREFIX" ]; then
          echo "PostgreSQL not found."
          exit 1
        fi

        if [ -z "$BISON_PREFIX" ] || [ ! -d "$BISON_PREFIX" ]; then
          echo "bison not found."
          exit 1
        fi

        if [ -z "$OSSL_PREFIX" ] || [ ! -d "$OSSL_PREFIX" ];then
          echo "OpenSSL not found."
          exit 1
        fi

        echo "PostgreSQL_ROOT=$PG_PREFIX" >> $GITHUB_ENV
        echo "PostgreSQL_INCLUDE_DIR=$PG_PREFIX/include" >> $GITHUB_ENV
        echo "PostgreSQL_LIBRARY=$PG_PREFIX/lib/postgresql/libpq.dylib" >> $GITHUB_ENV
        echo "PostgreSQL_ECPG_LIBRARY=$PG_PREFIX/lib/postgresql/libecpg.dylib" >> $GITHUB_ENV
        echo "PostgreSQL_PGTYPES_LIBRARY=$PG_PREFIX/lib/postgresql/libpgtypes.dylib" >> $GITHUB_ENV
        echo "BISON_ROOT=$BISON_PREFIX" >> $GITHUB_ENV
        echo "YACC_EXECUTABLE=$BISON_PREFIX/bin/bison" >> $GITHUB_ENV
        echo "OPENSSL_ROOT=$OSSL_PREFIX" >> $GITHUB_ENV
#        ls -lHR $PG_PREFIX
#        ls -lHR $BISON_PREFIX
    - name: Set PostgreSQL paths for CMake (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $pgDir = Get-ChildItem "C:\Program Files\PostgreSQL" `
                 -Directory | Sort-Object Name -Descending | Select-Object -First 1
        if ($pgDir) {
          $pgPath = $pgDir.FullName
          echo "PostgreSQL_ROOT=$pgPath" >> $env:GITHUB_ENV
          echo "PostgreSQL_INCLUDE_DIR=$pgPath\include" >> $env:GITHUB_ENV
          echo "PostgreSQL_LIBRARY=$pgPath\lib\libpq.lib" >> $env:GITHUB_ENV
          echo "PostgreSQL_ECPG_LIBRARY=$pgpath\lib\libecpg.lib" >> $env:GITHUB_ENV
          echo "PostgreSQL_PGTYPES_LIBRARY=$pgpath\lib\libpgtypes.lib" >> $env:GITHUB_ENV
        }

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_TESTING=ON
        -S ${{ github.workspace }}

    - name: Configure CMake (MacOS)
      if: runner.os == 'macOS'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DPostgreSQL_ROOT="${{ env.PostgreSQL_ROOT }}"
        -DPostgreSQL_INCLUDE_DIR="${{ env.PostgreSQL_INCLUDE_DIR }}"
        -DPostgreSQL_LIBRARY="${{ env.PostgreSQL_LIBRARY }}"
        -DPostgreSQL_ECPG_LIBRARY="${{ env.PostgreSQL_ECPG_LIBRARY }}"
        -DPostgreSQL_PGTYPES_LIBRARY="${{ env.PostgreSQL_PGTYPES_LIBRARY }}"
        -DYACC_EXECUTABLE="${{ env.YACC_EXECUTABLE }}"
        -DCMAKE_INSTALL_RPATH_USE_LINK_PATH=ON
        -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
        -S ${{ github.workspace }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $env:PATH = "${{ env.PostgreSQL_ROOT }}\bin;" + $env:PATH
        cmake -B ${{ steps.strings.outputs.build-output-dir }} `
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} `
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} `
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
        -DPostgreSQL_ROOT="${{ env.PostgreSQL_ROOT }}" `
        -DPostgreSQL_INCLUDE_DIR="${{ env.PostgreSQL_INCLUDE_DIR }}" `
        -DPostgreSQL_LIBRARY="${{ env.PostgreSQL_LIBRARY }}" `
        -DPostgreSQL_ECPG_LIBRARY="${{ env.PostgreSQL_ECPG_LIBRARY }}" `
        -DPostgreSQL_PGTYPES_LIBRARY="${{ env.PostgreSQL_PGTYPES_LIBRARY }}" `
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is
      # needed because the default Windows generator is a multi-config generator
      # (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config
      # is needed because the default Windows generator is a multi-config generator
      # (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Install
      run: cmake --install ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --prefix ${{ steps.strings.outputs.build-output-dir }}/install

    - name: Build Info (MacOS)
      if: runner.os == 'macOS'
      run: |
        echo "=== System Information ==="
        uname -a
        sw_vers
        echo "=== Architecture ==="
        uname -m
        echo "=== File Type ==="
        file ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnale || true
        file ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnalectl || true
        echo "=== Universal Binary Info ==="
        lipo -info ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnale
        lipo -info ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnalectl
        echo "=== Linked Libraries ==="
        otool -L ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnale | cat
        otool -L ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnalectl | cat
        echo "=== Path Entries ==="
        otool -l ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnale || true
        otool -l ${{ steps.strings.outputs.build-output-dir }}/install/bin/abagnalectl || true 

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: abagnale-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/install/**
          ${{ steps.strings.outputs.build-output-dir }}/**/*.exe
          ${{ steps.strings.outputs.build-output-dir }}/**/*.dll
          ${{ steps.strings.outputs.build-output-dir }}/**/*.so
          ${{ steps.strings.outputs.build-output-dir }}/**/*.dylib
